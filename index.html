<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Flow</title>

<style>
  body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
    margin: 0;
  }

  .container {
    margin-top: 100px;
  }

  input, select {
    padding: 10px;
    margin: 10px;
    width: 250px;
  }

  button {
    padding: 10px 20px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    display: inline-block;
    width: 90%;
    max-width: 600px;
  }

  /* 🔥 Vertical image layout */
  #imageContainer img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    margin-bottom: 15px;
    border-radius: 8px;
  }
</style>

</head>

<body>

<script type="text/javascript" src="https://d.oracleinfinity.io/infy/acs/account/jheeuuijzx/js/infinity_demo/odc.js"></script>

<script>
(function() {
  function initTracking() {
    if (typeof ORA === "undefined") {
      setTimeout(initTracking, 500);
      return;
    }

    console.log("ORA is ready. Tracking initialized.");

    document.addEventListener("click", function(e) {

      const btn = e.target.closest("button");
      if (!btn || btn.textContent.trim() !== "Submit") return;

      const userId = document.getElementById("userId")?.value;
      const productType = document.getElementById("productType")?.value;

      if (!userId || !productType) return;

      console.log("CLICK TRACK:", userId, productType);

      ORA.click({
        config: { applyMutations: true, sendSessionInfo: true },
        data: {
          infinity_event: productType,
          user_id: userId,
          product_type: productType
        }
      });
    });
  }
  initTracking();
})();
</script>

<!-- FORM PAGE -->
<div id="formPage" class="container">
  <div class="card">
    <h2>Login</h2>

    <input type="text" id="userId" placeholder="Enter User ID"><br>

    <select id="productType">
      <option value="">Select Product Type</option>
      <option value="Health">Health Insurance</option>
      <option value="Travel">Travel Insurance</option>
      <option value="Life">Life Insurance</option>
    </select><br>

    <button onclick="submitForm()">Submit</button>
  </div>
</div>

<!-- WELCOME PAGE -->
<div id="welcomePage" class="container" style="display:none;">
  <div class="card">
    <h2 id="welcomeText"></h2>

    <!-- 🔥 THIS IS WHERE ORACLE WILL RENDER IMAGES -->
    <div id="imageContainer"></div>

    <br><br>
    <button onclick="logout()">Back</button>
  </div>
</div>

<script>
function submitForm() {

  var GITHUB_URL = "https://raw.githubusercontent.com/kavyapulipati/banner-json/refs/heads/main/banner.json";

  const productType = document.getElementById("productType").value;

  if (!productType) {
    alert("Please select product type");
    return;
  }

  fetch(GITHUB_URL)
    .then(res => res.json())
    .then(data => {

      var banner = data.find(item => item.type === productType);

      var container = document.getElementById("imageContainer"); // ✅ fixed ID
      container.innerHTML = "";

      if (banner) {
        var img = document.createElement("img");
        img.src = banner.image_url;
        img.style.width = "100%";

        container.appendChild(img);
      } else {
        container.innerHTML = "No banner found";
      }

      // ✅ Move navigation AFTER data loads
      showWelcome();

    })
    .catch(err => {
      console.error("Error fetching JSON:", err);
    });
    
}

function showWelcome() {
  document.getElementById("formPage").style.display = "none";
  document.getElementById("welcomePage").style.display = "block";

  // Text will be updated by Oracle personalization script
}

// Back button
function logout() {
  document.getElementById("formPage").style.display = "block";
  document.getElementById("welcomePage").style.display = "none";

  // Clear images
  const container = document.getElementById("imageContainer");
  if (container) container.innerHTML = "";
}

// Auto load
window.onload = function() {
  if (localStorage.getItem("userId")) {
    showWelcome();
  }
};
</script>

</body>
</html>
